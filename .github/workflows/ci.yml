name: CI

# Estuary 7 is a fork-by-build of skin.estuary.modv2: it ships a rebranded skin zip built
# from a PINNED upstream commit plus anchored transforms. The test suite is the build
# contract - anchored transforms fail loud on a missing anchor, goldens pin the proven
# bytes, the no-bold sweep is enforced, and the boot-service self-heal is tested against a
# tvOS-accurate fake. This workflow runs it on every push so that contract is gated in CI,
# not only when someone remembers to run pytest locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      # Corrected 2026-07-14 (GAP 4 audit): most of this suite is NOT network-free. Its
      # `built`/`upstream_tree` fixtures (tests/conftest.py) call build_skin.ensure_tarball(),
      # which fetches the PINNED upstream tarball (sha256-verified) whenever upstream-cache/
      # is absent - true on every fresh CI checkout, since that dir is gitignored. So this job
      # already exercises the anchored transform against LIVE pinned upstream on every push.
      # What it does NOT cover: trim_payload() (the TRIM_PATHS upstream-drift assertions have
      # zero test coverage - confirmed by grep, 2026-07-14), the aggregate check_contracts()
      # gate, packaging the fully trimmed+contract-checked tree, or the CLI's own `--check`
      # double-build byte-compare. That is what the separate `anchored-build-check` job below
      # covers, kept separate so a slow/flaky upstream fetch there never blocks this job's
      # signal on the transform/golden/no-bold/self-heal contracts.
      # Covers: transform anchors (incl. mutation / fail-loud), golden parity vs the
      # hardware-verified 1.8.0 bytes, the no-bold contract, baked-default conditions,
      # rebrand, determinism, and the boot-service self-heal / menu-rebuild-loop regression.
      - name: Run the test suite
        run: python3 -m pytest tests/ -q

  anchored-build-check:
    # GAP 4: the pytest suite above never runs the real CLI entrypoint end to end, so a
    # break confined to trim_payload() (TRIM_PATHS upstream-drift detection), the aggregate
    # check_contracts() gate, or the packaged/trimmed zip's own determinism would not
    # surface anywhere in CI. This job runs the actual build twice against the pinned
    # upstream SHA and byte-compares the two zips - the same command a release does.
    # Separate job (not a step in `test`) so this fetch-dependent, slower path can never
    # slow down or flake the fast vendored-golden job above; it reports as its own
    # independent, loudly-named check.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        # No pip install: tools/build_skin.py and tools/skin_transforms.py are stdlib-only.
        # python 3.12 is required, not incidental - 3.9's tarfile.extractall() predates the
        # `filter=` argument extract_tree() passes (PEP 706); 3.12 has it.

      - name: Anchored double-build against pinned upstream (determinism gate)
        run: python3 tools/build_skin.py --check

  # Publishing is CI's job, not a hand-run command. Once BOTH gates above are green
  # on main (the golden/transform/self-heal contract AND the anchored double-build
  # determinism check), this builds and publishes the GitHub Release asset, then
  # dispatches the hub catalog rebuild. The test suite IS this skin's build contract
  # (anchored transforms fail loud, goldens pin the proven bytes), so a green main is
  # a proven build - auto-publish cannot ship an unverified skin. Idempotent per
  # version: a re-push of the same our_version publishes nothing.
  publish:
    needs: [test, anchored-build-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the skin zip from the pinned upstream
        run: python3 tools/build_skin.py

      - name: Publish the GitHub Release asset (once per version) + verify
        id: pub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SKIN=skin.estuary7
          REPO="${GITHUB_REPOSITORY}"
          VERSION=$(python3 -c "import json;print(json.load(open('skin_build.lock'))['our_version'])")
          ZIP="dist/${SKIN}-${VERSION}.zip"
          TAG="v${VERSION}"
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          ASSET_URL="https://github.com/${REPO}/releases/download/${TAG}/${SKIN}-${VERSION}.zip"
          echo "version=${VERSION} tag=${TAG} sha256=${SHA256}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "release ${TAG} already exists - nothing to publish (idempotent no-op)."
            exit 0
          fi

          gh release create "$TAG" "$ZIP" \
            --repo "$REPO" \
            --target "${GITHUB_SHA}" \
            --title "Estuary 7 ${VERSION}" \
            --notes "sha256: ${SHA256}"

          echo "verifying the asset is anonymously downloadable and byte-correct..."
          TMP=$(mktemp).zip
          curl -sSfL "$ASSET_URL" -o "$TMP"
          DOWNLOADED_SHA=$(shasum -a 256 "$TMP" | awk '{print $1}')
          rm -f "$TMP"
          if [ "$DOWNLOADED_SHA" != "$SHA256" ]; then
            echo "FATAL: published asset sha256 mismatch (expected ${SHA256}, got ${DOWNLOADED_SHA})" >&2
            exit 1
          fi
          echo "OK - ${ASSET_URL} sha256-verified against the CI build"
          echo "published=1" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN-created releases do not emit `release: published`, so notify-hub.yml
      # will not auto-fire. Dispatch the hub catalog rebuild directly (only when this run
      # actually published). Benign on failure: the hub cron still catches it within 24h.
      - name: Dispatch hub catalog rebuild
        if: steps.pub.outputs.published == '1'
        continue-on-error: true # benign: the hub's daily cron catches the release within 24h
        env:
          GH_TOKEN: ${{ secrets.T7B_DISPATCH_TOKEN }}
        run: >
          gh api repos/tony7bones/tony7bones.github.io/dispatches
          -f event_type=estuary7-release
